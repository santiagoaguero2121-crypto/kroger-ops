<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Seguimiento Diario ITN</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0f2a4a;--blue:#1a5fa8;--mid:#2e7dd4;--light:#deeaf7;--pale:#f2f7fd;
  --border:#c8ddf0;--text:#0f1c2e;--muted:#4a6a8a;--white:#fff;
  --ok:#1a6b3a;--okl:#e2f5eb;--warn:#9a7010;--warnl:#fff8e1;
  --danger:#991f1f;--dangerl:#fceaea;--crit:#7a0000;--critl:#ffe5e5;
}
body{font-family:system-ui,-apple-system,sans-serif;background:#f0f4f8;color:var(--text);font-size:13px;min-height:100vh}
.shell{max-width:1600px;margin:0 auto;padding:1.25rem}
.topbar{display:flex;align-items:center;background:var(--navy);border-radius:10px;padding:.75rem 1.25rem;margin-bottom:1rem;gap:10px;flex-wrap:wrap}
.topbar h1{font-size:13px;font-weight:700;color:#fff;letter-spacing:.05em;font-family:monospace;flex:1}
.topbar.has-crit{background:#7a0000}
.tbadge{font-size:10px;color:#9bc4e8;font-family:monospace}
.tcrit{font-size:11px;font-weight:700;color:#ffcccc;background:rgba(255,0,0,.25);padding:3px 10px;border-radius:6px}
.bbtn{font-size:11px;padding:4px 12px;border-radius:6px;border:none;cursor:pointer;font-family:inherit;height:28px;font-weight:600}
.bbtn.blue{background:#1a5fa8;color:#fff}.bbtn.blue:hover{background:#2e7dd4}
.bbtn.red{background:#991f1f;color:#fff}.bbtn.red:hover{background:#c0392b}
.ubox{background:var(--white);border:1.5px dashed var(--border);border-radius:10px;padding:1rem 1.5rem;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:.5rem;display:block}
.ubox:hover,.ubox.dragging{border-color:var(--mid);background:var(--pale)}
.ubox.loaded{border-color:var(--ok);border-style:solid;background:var(--okl)}
.src{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--blue);margin-bottom:.25rem}
.hint{font-size:11px;color:var(--muted)}
.fname{font-size:11px;color:var(--muted);margin-top:.3rem;font-style:italic}
.sbar{font-size:11px;color:var(--muted);padding:.3rem 0;min-height:18px}
.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:.6rem}
.stat{background:var(--white);border:0.5px solid var(--border);border-radius:8px;padding:.4rem .7rem;border-top:3px solid #c8ddf0;cursor:pointer;transition:transform .1s,box-shadow .1s}
.stat:hover{transform:translateY(-2px)}
.stat.stat-active{box-shadow:0 0 0 2px currentColor;transform:translateY(-1px)}
.stat.s-crit{border-top-color:#c00;background:var(--critl)}
.stat.s-ok{border-top-color:var(--ok)}.stat.s-warn{border-top-color:#EF9F27}.stat.s-new{border-top-color:var(--blue)}.stat.s-done{border-top-color:#888}
.stat .sl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.2rem}
.stat .sv{font-size:18px;font-weight:700;color:var(--navy);font-family:monospace}
.stat .ss{font-size:10px;color:var(--muted);margin-top:.1rem}
.days-bar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.day-chip{display:inline-flex;align-items:center;gap:6px;font-size:11px;padding:4px 10px;border-radius:20px;background:var(--white);border:1px solid var(--border)}
.day-chip .dc-label{font-weight:700;color:var(--navy)}
.day-chip .dc-del{cursor:pointer;color:var(--danger);font-size:14px;margin-left:2px}
.ds-title{font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap}
.filters{display:flex;gap:8px;align-items:center;flex-wrap:wrap;background:var(--white);border:0.5px solid var(--border);border-radius:9px;padding:.6rem .9rem;margin-bottom:1rem}
.filters label{font-size:11px;color:var(--muted);font-weight:600;white-space:nowrap}
.filters select,.filters input[type=text]{font-size:11px;padding:4px 8px;border:0.5px solid var(--border);border-radius:6px;background:var(--white);color:var(--text);height:28px;font-family:inherit}
.filters input[type=text]{width:150px}
.bclear{font-size:11px;padding:4px 12px;border:0.5px solid var(--border);border-radius:6px;background:var(--white);color:var(--muted);cursor:pointer;height:28px;font-family:inherit}
.twrap{background:var(--white);border:0.5px solid var(--border);border-radius:10px;overflow:hidden}
.tscroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:11.5px}
thead th{padding:6px 10px;font-size:10px;font-weight:700;letter-spacing:.05em;text-align:right;white-space:nowrap;border-bottom:1.5px solid var(--border);background:var(--pale);color:var(--muted);position:sticky;top:0;z-index:2}
thead th.tl{text-align:left}
.day-hdr{padding:4px 10px;text-align:right;border-bottom:0.5px solid var(--border);background:#f0f6ff;color:var(--blue);font-size:9px;font-weight:700;white-space:nowrap}
.day-hdr.tl{text-align:left}
td{padding:5px 10px;border-bottom:0.5px solid #edf3fa;text-align:right;vertical-align:middle}
td.tl{text-align:left}
td.tc{text-align:center}
tr:hover td{background:#f7faff}
tr.row-ok td{border-left:3px solid var(--ok)}
tr.row-warn td{border-left:3px solid #EF9F27}
tr.row-new td{border-left:3px solid var(--blue)}
tr.row-done td{border-left:3px solid #888;opacity:.65}
tr.row-crit td{border-left:3px solid #c00;background:var(--critl)!important}
tr.row-gone td{border-left:3px solid #bbb;opacity:.55}
.po-cell{font-family:monospace;font-size:13px;font-weight:700;color:var(--navy)}
.dtag{font-size:10px;padding:1px 7px;border-radius:4px;background:var(--light);color:var(--blue);font-weight:600}
.qty-val{font-family:monospace;font-weight:700;color:var(--navy)}
.qty-empty{color:#c5d5e5;font-family:monospace}
.delta{font-family:monospace;font-weight:700;font-size:11px;padding:1px 6px;border-radius:4px}
.delta.up{background:var(--dangerl);color:var(--danger)}
.delta.down{background:var(--okl);color:var(--ok)}
.delta.zero{background:#f0f4f8;color:var(--muted)}
.delta.new{background:var(--light);color:var(--blue)}
.delta.done{background:#f0f0f0;color:#888}
.delta.crit{background:var(--critl);color:#c00;font-weight:900}
.delta.gone{background:#f5f5f5;color:#999}
.delta.add{background:var(--okl);color:var(--ok);font-weight:900}
.delta.cancel{background:var(--dangerl);color:var(--danger);font-weight:900}
.pend{font-size:10px;color:#EF9F27;font-weight:700;background:#fff8e1;padding:1px 7px;border-radius:4px}
.ship-date{font-family:monospace;font-size:11px}
.ship-past{color:var(--danger);font-weight:700}
.ship-today{color:var(--ok);font-weight:700}
.ship-future{color:var(--muted)}
/* detail */
.drow td{padding:0!important;border-left:none!important;background:#fafcff!important}
.dinner{padding:.75rem 1rem 1rem;border-top:1px dashed var(--border)}
.det-tbl{width:100%;border-collapse:collapse;font-size:11px}
.det-tbl th{font-size:10px;color:var(--muted);font-weight:700;padding:3px 8px;border-bottom:0.5px solid var(--border);text-align:right;background:var(--pale)}
.det-tbl th.tl{text-align:left}
.det-tbl td{padding:4px 8px;border-bottom:0.5px solid #f0f4f8;text-align:right}
.det-tbl td.tl{text-align:left}
.det-tbl tr:last-child td{border-bottom:none}
.det-tbl tr.sku-add td{background:#EAF3DE !important;border-left:3px solid #639922;color:#27500A !important}
.det-tbl tr.sku-add td:first-child{padding-left:6px;color:#27500A !important}
.det-tbl tr.sku-warn td{background:#FAEEDA !important;border-left:3px solid #EF9F27;color:#633806 !important}
.det-tbl tr.sku-warn td:first-child{padding-left:6px;color:#633806 !important}
.det-tbl tr.sku-new td{background:#EAF3DE !important;border-left:3px solid #639922;color:#27500A !important}
.det-tbl tr.sku-new td:first-child{padding-left:6px;color:#27500A !important}
.det-tbl tr.sku-gone td{background:#FCEBEB !important;border-left:3px solid #E24B4A;color:#791F1F !important}
.det-tbl tr.sku-gone td:first-child{padding-left:6px;color:#791F1F !important}
.det-tbl tr.sku-zero td{background:#FCEBEB !important;border-left:3px solid #E24B4A;color:#791F1F !important}
.det-tbl tr.sku-zero td:first-child{padding-left:6px;color:#A32D2D !important}
.sortable{cursor:pointer;user-select:none}
.sortable:hover{background:var(--light)!important;color:var(--navy)!important}
.xbtn{background:none;border:0.5px solid var(--border);border-radius:4px;cursor:pointer;font-size:13px;padding:1px 8px;color:var(--muted);font-family:inherit}
.xbtn:hover{background:var(--light)}
.pgbar{display:flex;align-items:center;gap:6px;padding:.6rem .9rem;border-top:0.5px solid var(--border);background:var(--pale);font-size:11px;color:var(--muted)}
.pgbar button{font-size:11px;padding:3px 10px;border:0.5px solid var(--border);border-radius:6px;background:var(--white);color:var(--text);cursor:pointer;font-family:inherit}
.pgbar button:hover:not(:disabled){background:var(--light)}
.pgbar button:disabled{opacity:.4;cursor:default}
.pgbar select{font-size:11px;padding:3px 6px;border:0.5px solid var(--border);border-radius:6px;background:var(--white);color:var(--text);font-family:inherit}
.pginfo{margin-left:auto;font-size:10px}
.erow{text-align:center;padding:2.5rem;color:var(--muted);font-size:12px}
</style>
</head>
<body>
<div class="shell">

<div class="topbar" id="topbar">
  <h1>&#9632; SEGUIMIENTO DIARIO — ITN</h1>
  <span class="tbadge" id="badge">0 días en historial</span>
  <span class="tcrit" id="tcrit" style="display:none"></span>
  <button class="bbtn blue" id="btnExport" onclick="exportCSV(false)" style="display:none">⬇ Exportar todo</button>
  <button class="bbtn blue" id="btnExportSel" onclick="exportCSV(true)" style="display:none">⬇ Exportar selección</button>
  <button class="bbtn red" onclick="clearHistory()">🗑 Limpiar historial</button>
</div>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.25rem">
<input type="file" id="inp-itn" accept=".xls,.xlsx" style="display:none"
  onchange="if(this.files&&this.files[0])loadITN(this.files[0]);this.value=''">
<label for="inp-itn" class="ubox" id="box-itn" style="margin-bottom:0"
  ondragover="event.preventDefault();this.classList.add('dragging')"
  ondragleave="this.classList.remove('dragging')"
  ondrop="event.preventDefault();this.classList.remove('dragging');if(event.dataTransfer.files[0])loadITN(event.dataTransfer.files[0])">
  <div class="src">📥 Cargar ITN del día</div>
  <div class="hint">Detecta fecha automáticamente · guarda historial · compara días anteriores</div>
  <div class="fname" id="fn-itn">Haz clic o arrastra aquí · .xls / .xlsx</div>
</label>
<input type="file" id="inp-wo" accept=".xls,.xlsx" style="display:none"
  onchange="if(this.files&&this.files[0])loadWO(this.files[0]);this.value=''">
<label for="inp-wo" class="ubox" id="box-wo" style="margin-bottom:0"
  ondragover="event.preventDefault();this.classList.add('dragging')"
  ondragleave="this.classList.remove('dragging')"
  ondrop="event.preventDefault();this.classList.remove('dragging');if(event.dataTransfer.files[0])loadWO(event.dataTransfer.files[0])">
  <div class="src" style="color:#1a6b3a">📋 Cargar WO (opcional)</div>
  <div class="hint">Para verificar si cada PO tiene WO creada</div>
  <div class="fname" id="fn-wo">Haz clic o arrastra aquí · .xls / .xlsx</div>
</label>
<div></div>
</div>
<div class="sbar" id="sbar"></div>

<div id="dash" style="display:none">
  <div class="stats" id="stats"></div>
  <div style="margin-bottom:1rem"><div class="stats" id="stats"></div><div id="div-summary" style="display:none;background:var(--critl);border:1px solid #f09595;border-radius:8px;padding:.5rem 1rem;margin-bottom:.75rem;flex-wrap:wrap;gap:6px;align-items:center"></div>

  </div></div></div></div>
  <div class="days-bar" id="days-bar">
    <span class="ds-title">Días en historial:</span>
  </div>

  <div class="filters">
    <label>Estado:</label>
    <select id="f-show" onchange="applyF()">
      <option value="all">Todos</option>
      <option value="crit">🚨 Críticos</option>
      <option value="changed">⚠️ Con cambios</option>
      <option value="new">🆕 Nuevos</option>
      <option value="done">✅ Entregados</option>
      <option value="gone">❌ Eliminados</option>
      <option value="same">Sin cambio</option>
    </select>
    <button id="btn-hoy" class="bclear" onclick="toggleToday()" style="color:var(--blue);font-weight:700;border-color:var(--blue)">📅 Ver hoy</button>
    <label>Desde:</label>
    <input type="date" id="f-from" onchange="applyF()" style="font-size:11px;padding:3px 7px;border:0.5px solid var(--border);border-radius:6px;background:var(--white);color:var(--text);height:28px;font-family:inherit">
    <label>Hasta:</label>
    <input type="date" id="f-to" onchange="applyF()" style="font-size:11px;padding:3px 7px;border:0.5px solid var(--border);border-radius:6px;background:var(--white);color:var(--text);height:28px;font-family:inherit">
    <label>Día ITN:</label>
    <select id="f-day" onchange="applyF()">
      <option value="">Todos</option>
    </select>
    <label>Región:</label>
    <select id="f-reg" onchange="onRegionChange()">
      <option value="">Todas</option>
      <option value="West">🌊 West</option>
      <option value="East">🌄 East</option>
      <option value="Xenia">⭐ Xenia</option>
    </select>
    <label>División:</label>
    <select id="f-div" onchange="applyF()"></select>
    <label>PO:</label>
    <input type="text" id="f-po" placeholder="Buscar PO..." oninput="applyF()">
    <button class="bclear" onclick="clearF()">Limpiar</button>
    <span style="margin-left:auto;font-size:11px;color:var(--muted)" id="clbl"></span>
  </div>

  <div class="twrap">
    <div class="tscroll">
      <table>
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
        <tfoot><tr id="tfoot-row" style="background:var(--pale);font-size:11px"></tr></tfoot>
      </table>
    </div>
    <div class="pgbar">
      <button onclick="pgGo(-1)" id="pgPrev">← Anterior</button>
      <span id="pgInfo"></span>
      <button onclick="pgGo(1)" id="pgNext">Siguiente →</button>
      <label style="margin-left:12px">Por página:</label>
      <select onchange="PG_SIZE=+this.value;PG=0;renderTable()">
        <option value="25">25</option>
        <option value="50" selected>50</option>
        <option value="100">100</option>
        <option value="9999">Todos</option>
      </select>
      <span class="pginfo" id="pgTotal"></span>
    </div>
  </div>
</div>
</div>

<script>
var HIST_KEY = 'dk_itn_seg_v3';
var MAX_DAYS = 7;
var STAT_FILTER = '';
var PREFIXES = ['100','108','115','128','155','288','308','345','348','358','368','388'];
var EXCLUDED_CUSTOMERS = ['00329'];
var DIVS = {
  '00242':'Smiths','00824':'824','03932':'Kendall','20200':'Frys',
  '22232':'Las Vegas','82800':'Compton','83800':'Riverside',
  '00018':'NFC','18000':'NFC','29206':'King Soopers',
  '00212':'Dillons','00238':'Dallas','00245':'Houston',
  '00244':'Champ Floral','01120':'Fort Gillem','00328':'Xenia'
};
var PREFIX_DIV = {
  '155':'Smiths / Kendall','2888':'Frys','308':'Compton','108':'Riverside',
  '100001':'Las Vegas','1281':'NFC','3881':'King Soopers','3882':'King Soopers','3687':'Dillons',
  '3588':'Dallas','3484':'Houston','3454':'Champ Floral','1157':'Fort Gillem'
};
var WEST_DIVS = ['Riverside','Compton','Frys','Kendall','824','Smiths','Las Vegas','Smiths / Kendall'];
var XENIA_DIVS = ['Xenia','NFC'];
var RWH_DIV = {
  // Exact matches from comparador
  'Kroger Kendal North':'Kendall','Kroger Ralphs Riverside':'Riverside',
  'Kroger Ralphs Compton WHS':'Compton','Dillons Produce Whse':'Dillons',
  'Kroger Frys Tolleson':'Frys','Kroger Fort Gillem GA':'Fort Gillem',
  'Champion Floral Whse - Houston':'Houston','Kroger East Dallas Whs':'Dallas',
  'King Sooper Floral Denver':'King Soopers','Las Vegas Fresh Center':'Las Vegas',
  'Kroger NFC Whs':'NFC','Kroger Smiths':'Smiths','Kroger East Houston Whs':'Houston',
  // Abbreviated from seguimiento file
  'KendalNorth':'Kendall','Kendal North':'Kendall',
  'FortGillem':'Fort Gillem','Fort Gillem':'Fort Gillem',
  'Dallas Whs':'Dallas','KR Riverside':'Riverside',
  'KR-RalComptn':'Compton','Frys Whse':'Frys',
  'Dill-Produce':'Dillons','KSFloral-Den':'King Soopers',
  'LAS VEGAS':'Las Vegas','NFC WHS':'NFC',
  'Houston Whs':'Houston','Champ-Floral':'Champ Floral',
  'Champ Floral':'Champ Floral','ROUNDYS':'Smiths'
};

function divFromRWH(rwh){
  if(!rwh) return '';
  var r = rwh.trim().replace(/\xa0/g,'').replace(/^'+|'+$/g,'').trim();
  if(RWH_DIV[r]) return RWH_DIV[r];
  for(var k in RWH_DIV){ if(r.toLowerCase().indexOf(k.toLowerCase())>=0) return RWH_DIV[k]; }
  return r;
}
function divRegion(div){
  if(!div) return '';
  if(XENIA_DIVS.indexOf(div)>=0) return 'Xenia';
  if(WEST_DIVS.indexOf(div)>=0) return 'West';
  return 'East';
}
function isKroger(po){
  po = String(po||'').replace(/\xa0/g,'').trim();
  if(!/^\d{6,15}$/.test(po)) return false;
  return PREFIXES.some(function(p){ return po.indexOf(p)===0; });
}
function cleanVal(v){ return String(v||'').replace(/\xa0/g,'').trim(); }
function num(v){ var n=parseFloat(cleanVal(v)); return isNaN(n)?0:n; }
function cleanKey(k){ return String(k||'').replace(/^'+|'+$/g,'').trim(); }
function fc(obj,pat){ return Object.keys(obj).find(function(k){ return pat.test(cleanKey(k)); })||''; }
function toISO(s){
  if(!s) return '';
  var m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  return m?m[3]+'-'+m[1].padStart(2,'0')+'-'+m[2].padStart(2,'0'):'';
}
function fd(d){ return String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0')+'/'+d.getFullYear(); }
function fmtLabel(iso){
  var d=new Date(iso+'T12:00:00');
  var days=['Dom','Lun','Mar','Mie','Jue','Vie','Sab'];
  var months=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return days[d.getDay()]+' '+String(d.getDate()).padStart(2,'0')+' '+months[d.getMonth()];
}
function fN(v){ return v?Math.round(v).toLocaleString():'—'; }
function fA(v){ return v?'$'+parseFloat(v).toFixed(2):'—'; }
function todayISO(){
  var t=new Date();
  return t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');
}

var HIST_DATA=[], FILTERED=[], EXPANDED={}, _allRows=[];
var WO_POS={};
var SHIP_SELECTED=new Set();
var PG=0, PG_SIZE=50;
var SORT_COL='', SORT_DIR=1;
var SELECTED={};

(function(){
  try{ var r=localStorage.getItem(HIST_KEY); if(r) HIST_DATA=JSON.parse(r); }catch(e){}
  if(!Array.isArray(HIST_DATA)) HIST_DATA=[];
  if(HIST_DATA.length>0) buildUI();
})();

function save(){ try{ localStorage.setItem(HIST_KEY,JSON.stringify(HIST_DATA)); }catch(e){} }
function sbar(m){ document.getElementById('sbar').textContent=m; }

function loadITN(file){
  sbar('Leyendo '+file.name+'...');
  document.getElementById('fn-itn').textContent=file.name;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var rows=null;
      // Try header rows 0-6 until we find PO column
      for(var h=0;h<=6;h++){
        var tmp=XLSX.utils.sheet_to_json(ws,{defval:'',range:h});
        if(!tmp.length) continue;
        var sample=tmp[0];
        if(fc(sample,/^PO$/i)){ rows=tmp; break; }
      }
      if(!rows) rows=XLSX.utils.sheet_to_json(ws,{defval:''});
      if(!rows.length){ sbar('Archivo vacío o formato no reconocido.'); return; }

      var sample=rows[0];
      var colPO   = fc(sample,/^PO$/i);
      var colST   = fc(sample,/^STATUS$/i);
      var colSHP  = fc(sample,/^SHIP.DATE$/i)||fc(sample,/SHIP/i);
      var colRWH  = fc(sample,/^RWH$/i)||fc(sample,/^RW\/H$/i);
      var colCAR  = fc(sample,/^CARRIER$/i);
      var colSKU  = fc(sample,/^SKU$/i);
      var colDESC = fc(sample,/^DESC$/i);
      var colQTY  = fc(sample,/^S.QTY$/i)||fc(sample,/^QTY$/i);
      var colAMT  = fc(sample,/^S.COST$/i);

      var poMap={};
      rows.forEach(function(r){
        var po=cleanVal(r[colPO]);
        if(!isKroger(po)) return;
        var st=cleanVal(r[colST]).toUpperCase();
        if(st.indexOf('CANCEL')>=0&&st.indexOf('RECEIV')<0) return;
        var qty=num(r[colQTY]);
        var amt=num(r[colAMT]);
        var ship=cleanVal(r[colSHP]);
        var rwh=cleanVal(r[colRWH]);
        var carrier=cleanVal(r[colCAR]);
        var sku=cleanVal(r[colSKU]);
        var desc=cleanVal(r[colDESC]);
        var div=divFromRWH(rwh)||divFromPO(po);
        var isRec=st.indexOf('RECEIV')>=0;
        if(!poMap[po]) poMap[po]={qty:0,amt:0,div:div,carrier:carrier,ship:ship,prods:{},received:isRec};
        poMap[po].qty+=qty; poMap[po].amt+=amt;
        if(!poMap[po].div&&div) poMap[po].div=div;
        if(!poMap[po].carrier&&carrier) poMap[po].carrier=carrier;
        if(!poMap[po].ship&&ship) poMap[po].ship=ship;
        if(sku||desc){
          var key=sku?sku:('desc:'+desc.toUpperCase());
          if(!poMap[po].prods[key]) poMap[po].prods[key]={qty:0,desc:desc,sku:sku};
          poMap[po].prods[key].qty+=qty;
        }
      });

      // Detect date from first PO ship date or filename
      var iso=null;
      // Try filename first: 03-06-2026 or 2026-06-03
      var fn=file.name;
      var m1=fn.match(/(\d{2})-(\d{2})-(\d{4})/);
      var m2=fn.match(/(\d{4})-(\d{2})-(\d{2})/);
      if(m1) iso=m1[3]+'-'+m1[2]+'-'+m1[1];
      else if(m2) iso=m2[1]+'-'+m2[2]+'-'+m2[3];
      // Fallback: most common ship date in POs
      if(!iso){
        var dateCounts={};
        Object.values(poMap).forEach(function(p){
          var s=toISO(p.ship);
          if(s) dateCounts[s]=(dateCounts[s]||0)+1;
        });
        var best=Object.keys(dateCounts).sort(function(a,b){return dateCounts[b]-dateCounts[a];})[0];
        if(best) iso=best;
      }
      if(!iso) iso=todayISO();

      var label=fmtLabel(iso);
      var entry={date:iso,label:label,pos:poMap};
      var idx=HIST_DATA.findIndex(function(d){return d.date===iso;});
      if(idx>=0){ HIST_DATA[idx]=entry; sbar('✓ Actualizado '+label+' — '+Object.keys(poMap).length+' POs'); }
      else{
        HIST_DATA.push(entry);
        HIST_DATA.sort(function(a,b){return a.date<b.date?-1:1;});
        if(HIST_DATA.length>MAX_DAYS) HIST_DATA=HIST_DATA.slice(HIST_DATA.length-MAX_DAYS);
        sbar('✓ Guardado '+label+' — '+Object.keys(poMap).length+' POs');
      }
      save();
      document.getElementById('box-itn').classList.add('loaded');
      buildUI();
    }catch(err){ sbar('Error: '+err.message); }
  };
  reader.readAsArrayBuffer(file);
}

function loadWO(file){
  sbar('Leyendo WO: '+file.name+'...');
  document.getElementById('fn-wo').textContent=file.name;
  var reader=new FileReader();
  reader.onload=function(e){
    try{

      var ws=wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(ws,{defval:''});
      if(!rows.length){ sbar('WO vacío.'); return; }
      var sample=rows[0];
      var colPO=fc(sample,/^cust_po$/i)||fc(sample,/^PO$/i)||fc(sample,/^PO.Number$/i);
      WO_POS={};
      rows.forEach(function(r){
        var po=cleanVal(r[colPO]||'').replace(/ /g,'').trim();
        if(po&&isKroger(po)) WO_POS[po]=true;
      });
      document.getElementById('box-wo').classList.add('loaded');
      sbar('✓ WO cargado — '+Object.keys(WO_POS).length+' POs con WO');
      if(_allRows.length) applyF();
    }catch(err){ sbar('Error WO: '+err.message); }
  };
  reader.readAsArrayBuffer(file);
}

function getStatus(r){
  var latestISO = HIST_DATA.length ? HIST_DATA[HIST_DATA.length-1].date : todayISO();
  var shipISO = toISO(r.ship);
  var inLatest = !!r.days[HIST_DATA.length-1];
  var wasPresent = r.days.some(function(d,i){ return i<HIST_DATA.length-1 && !!d; });

  if(r.received) return 'done'; // RECEIVED = entregado, nunca crítico
  if(inLatest){
    // Still in today's report
    if(shipISO && shipISO < latestISO) return 'crit'; // Ship passed but still open
    if(r.isNew) return 'new';
    if(r.changed) return 'changed';
    return 'same';
  } else {
    // Not in latest report
    if(wasPresent) return 'done'; // Was there before → delivered (regardless of ship date)
    return 'gone'; // Never seen before and gone
  }
}

function buildTable(){
  var allPOs={};
  HIST_DATA.forEach(function(d){
    Object.keys(d.pos).forEach(function(po){
      if(!allPOs[po]) allPOs[po]={div:'',carrier:'',ship:'',prods:{}};
      var p=d.pos[po];
      if(!allPOs[po].div&&p.div) allPOs[po].div=p.div;
      if(!allPOs[po].carrier&&p.carrier) allPOs[po].carrier=p.carrier;
      if(!allPOs[po].ship&&p.ship) allPOs[po].ship=p.ship;
      if(p.received) allPOs[po].received=true;
      // Merge prods
      Object.keys(p.prods||{}).forEach(function(k){
        if(!allPOs[po].prods[k]) allPOs[po].prods[k]=p.prods[k];
      });
    });
  });

  var rows=Object.keys(allPOs).map(function(po){
    var days=HIST_DATA.map(function(d){return d.pos[po]||null;});
    var lastIdx=-1,prevIdx=-1;
    for(var i=days.length-1;i>=0;i--){if(days[i]){lastIdx=i;break;}}
    for(var i=lastIdx-1;i>=0;i--){if(days[i]){prevIdx=i;break;}}
    var lQ=days[lastIdx]?days[lastIdx].qty:0;
    var pQ=days[prevIdx]?days[prevIdx].qty:0;
    var dQ=Math.round(lQ-pQ);
    var isNew=lastIdx>=0&&prevIdx<0&&!!days[HIST_DATA.length-1];
    var isGone=lastIdx<HIST_DATA.length-1||!days[HIST_DATA.length-1];
    var changed=!isNew&&!isGone&&Math.abs(dQ)>0;
    // Detect ship date change
    var shipChanged=false;
    var ships=days.map(function(d){return d?d.ship:'';}).filter(function(s){return s;});
    if(ships.length>=2){
      var uniqueShips=ships.filter(function(s,i,a){return a.indexOf(s)===i;});
      if(uniqueShips.length>1) shipChanged=true;
    }
    var carrierDayIdx=-1;
    for(var ci=0;ci<HIST_DATA.length;ci++){
      if(HIST_DATA[ci].pos[po]&&HIST_DATA[ci].pos[po].carrier){ carrierDayIdx=ci; break; }
    }
    var r={po:po,div:allPOs[po].div,carrier:allPOs[po].carrier,carrierDayIdx:carrierDayIdx,ship:allPOs[po].ship,received:!!allPOs[po].received,shipChanged:shipChanged,
           prods:allPOs[po].prods,days:days,lQ:lQ,pQ:pQ,dQ:dQ,
           isNew:isNew,isGone:isGone,changed:changed};
    r.status=getStatus(r);
    // Days overdue for critical POs
    r.daysOverdue=0;
    if(r.status==='crit'){
      var latestISO=HIST_DATA.length?HIST_DATA[HIST_DATA.length-1].date:todayISO();
      var shipISO=toISO(r.ship);
      if(shipISO&&shipISO<latestISO){
        var d1=new Date(shipISO+'T12:00:00'), d2=new Date(latestISO+'T12:00:00');
        r.daysOverdue=Math.round((d2-d1)/(1000*60*60*24));
      }
    }
    // WO status
    r.hasWO = !!WO_POS[po];
    r.noWO = Object.keys(WO_POS).length>0 && !r.hasWO && !!r.days[HIST_DATA.length-1];
    // Ship date reschedule detection
    r.shipDelay=0; r.shipAdvance=0;
    var validShips=days.map(function(d){return d&&d.ship?toISO(d.ship):'';}).filter(function(s){return s;});
    if(validShips.length>=2){
      var firstShip=validShips[0];
      var lastShip=validShips[validShips.length-1];
      if(firstShip!==lastShip){
        var d1=new Date(firstShip+'T12:00:00'), d2=new Date(lastShip+'T12:00:00');
        var diff=Math.round((d2-d1)/(1000*60*60*24));
        if(diff>0) r.shipDelay=diff;
        else if(diff<0) r.shipAdvance=Math.abs(diff);
      }
    }
    // No carrier alert - only for tomorrow onwards
    var tomorrow=new Date(); tomorrow.setDate(tomorrow.getDate()+1);
    var tomorrowISO=tomorrow.getFullYear()+'-'+String(tomorrow.getMonth()+1).padStart(2,'0')+'-'+String(tomorrow.getDate()).padStart(2,'0');
    r.noCar=!r.carrier&&!!r.ship&&toISO(r.ship)>=tomorrowISO&&(r.status==='same'||r.status==='changed'||r.status==='new');
    return r;
  });

  // Sort: crit first, then changed, new, same, done, gone
  var order={crit:0,changed:1,new:2,same:3,done:4,gone:5};
  rows.sort(function(a,b){
    return (order[a.status]||99)-(order[b.status]||99)||a.po.localeCompare(b.po);
  });

  // Build ship date multi-select
  var shipDates={};
  rows.forEach(function(r){ if(r.ship) shipDates[r.ship]=true; });
  var sortedDates=Object.keys(shipDates).sort(function(a,b){ return toISO(a)<toISO(b)?-1:1; });
  buildShipDD(sortedDates);

  // Stats
  var nCrit=rows.filter(function(r){return r.status==='crit';}).length;
  var nChanged=rows.filter(function(r){return r.status==='changed';}).length;
  var nNew=rows.filter(function(r){return r.status==='new';}).length;
  var nDone=rows.filter(function(r){return r.status==='done';}).length;
  var nGone=rows.filter(function(r){return r.status==='gone';}).length;
  var nSame=rows.filter(function(r){return r.status==='same';}).length;
  var nNoCar=rows.filter(function(r){return r.noCar;}).length;
  var qCrit=rows.filter(function(r){return r.status==='crit';}).reduce(function(s,r){return s+r.lQ;},0);

  var activeAttr=function(key){ return STAT_FILTER===key?' stat-active':''; };
  document.getElementById('stats').innerHTML=
    '<div class="stat s-crit'+activeAttr('crit')+'" onclick="toggleStatFilter(\'crit\')"><div class="sl">🚨 Críticos</div><div class="sv">'+nCrit+'</div><div class="ss">'+Math.round(qCrit).toLocaleString()+' cajas</div></div>'+
    '<div class="stat s-warn'+activeAttr('changed')+'" onclick="toggleStatFilter(\'changed\')"><div class="sl">⚠️ Cambios</div><div class="sv">'+nChanged+'</div><div class="ss">qty diferente</div></div>'+
    '<div class="stat s-new'+activeAttr('new')+'" onclick="toggleStatFilter(\'new\')"><div class="sl">🆕 Nuevos</div><div class="sv">'+nNew+'</div><div class="ss">no estaban antes</div></div>'+
    '<div class="stat s-ok'+activeAttr('same')+'" onclick="toggleStatFilter(\'same\')"><div class="sl">✅ Sin cambio</div><div class="sv">'+nSame+'</div><div class="ss">todo igual</div></div>'+
    '<div class="stat s-done'+activeAttr('done')+'" onclick="toggleStatFilter(\'done\')"><div class="sl">📦 Entregados</div><div class="sv">'+nDone+'</div><div class="ss">ship date pasó</div></div>'+
    (nNoCar?'<div class="stat s-crit'+activeAttr('nocar')+'" onclick="toggleStatFilter(\'nocar\')"><div class="sl">🚚 Sin Carrier</div><div class="sv">'+nNoCar+'</div><div class="ss">ship date próxima</div></div>':'<div class="stat s-done'+activeAttr('gone')+'" onclick="toggleStatFilter(\'gone\')"><div class="sl">❌ Eliminados</div><div class="sv">'+nGone+'</div><div class="ss">desaparecieron</div></div>');

  // Division summary - critical POs by division
  var divCrit={};
  rows.filter(function(r){return r.status==='crit';}).forEach(function(r){
    var d=r.div||'Sin div'; divCrit[d]=(divCrit[d]||0)+1;
  });
  var divSumEl=document.getElementById('div-summary');
  if(divSumEl){
    if(Object.keys(divCrit).length>0){
      divSumEl.style.display='';
      divSumEl.innerHTML='<span style="font-size:11px;font-weight:700;color:#c00;margin-right:8px">🚨 Críticos por división:</span>'
        +Object.keys(divCrit).sort().map(function(d){
          return '<span style="font-size:11px;background:var(--critl);color:#c00;padding:2px 8px;border-radius:12px;margin-right:4px;font-weight:600">'+d+': '+divCrit[d]+'</span>';
        }).join('');
    } else { divSumEl.style.display='none'; }
  }

  // Topbar alert
  var topbar=document.getElementById('topbar');
  var tcrit=document.getElementById('tcrit');
  if(nCrit>0){
    topbar.classList.add('has-crit');
    tcrit.style.display='';
    tcrit.textContent='⚠️ '+nCrit+' PO'+(nCrit>1?'s':'')+' sin entregar con ship date vencida — '+Math.round(qCrit).toLocaleString()+' cajas';
  } else {
    topbar.classList.remove('has-crit');
    tcrit.style.display='none';
  }

  // Thead
  var th1='<tr>';
  th1+='<th rowspan="2" style="width:32px;text-align:center;vertical-align:middle"><input type="checkbox" id="chk-all" onchange="toggleAll(this.checked)" title="Seleccionar todo"></th>';
  th1+='<th rowspan="2" class="tl sortable" style="min-width:140px;vertical-align:bottom" ondblclick="sortBy(&quot;po&quot;)">PO</th>';
  th1+='<th rowspan="2" class="tl sortable" style="vertical-align:bottom" ondblclick="sortBy(&quot;div&quot;)">División</th>';
  th1+='<th rowspan="2" class="tl sortable" style="vertical-align:bottom" ondblclick="sortBy(&quot;ship&quot;)">Ship Date</th>';
  th1+='<th rowspan="2" class="tl" style="vertical-align:bottom">Carrier</th>';
  HIST_DATA.forEach(function(d,i){ th1+='<th class="sortable" style="text-align:center;background:#e6f1fb;color:#185fa5" ondblclick="sortBy(&quot;qty'+i+'&quot;)">'+d.label+'</th>'; });
  th1+='<th rowspan="2" class="sortable" style="min-width:80px;vertical-align:bottom" ondblclick="sortBy(&quot;status&quot;)">Estado</th>';
  th1+='<th rowspan="2" style="width:40px"></th></tr>';
  var th2='<tr><th class="day-hdr" style="font-size:9px;color:var(--muted)" colspan="5">doble clic en columna = ordenar</th>';
  HIST_DATA.forEach(function(){ th2+='<th class="day-hdr">Qty</th>'; });
  th2+='<th class="day-hdr"></th><th class="day-hdr"></th></tr>';
  document.getElementById('thead').innerHTML=th1+th2;

  _allRows=rows;
  applyF();
}

function toggleStatFilter(key){

  // Sync with f-show select
  var fshow=document.getElementById('f-show');
  if(fshow){
    if(key==='nocar'){ fshow.value=''; }
    else { fshow.value=STAT_FILTER; }
  }
  applyF();
  // Re-render stats to update active state
  var statsEl=document.getElementById('stats');
  if(statsEl) Array.from(statsEl.children).forEach(function(el){
    el.className=el.className.replace(' stat-active','');
    if(STAT_FILTER&&el.getAttribute('onclick')&&el.getAttribute('onclick').indexOf('\''+STAT_FILTER+'\'')>=0) el.classList.add('stat-active');
  });
}

function applyF(){
  var show=document.getElementById('f-show').value;
  var shipF=null; // multi-select handled by SHIP_SELECTED
  var dayF=(document.getElementById('f-day')||{value:''}).value||'';
  var regF=(document.getElementById('f-reg')||{value:''}).value||'';
  var divF=document.getElementById('f-div').value;
  var poF=document.getElementById('f-po').value.toLowerCase();
  var fromF=(document.getElementById('f-from')||{value:''}).value||'';
  var toF=(document.getElementById('f-to')||{value:''}).value||'';
  FILTERED=_allRows.filter(function(r){
    if(STAT_FILTER==='nocar'&&!r.noCar) return false;
    if(STAT_FILTER&&STAT_FILTER!=='nocar'&&r.status!==STAT_FILTER) return false;
    if(show&&r.status!==show) return false;
    if(fromF&&r.ship&&toISO(r.ship)<fromF) return false;
    if(toF&&r.ship&&toISO(r.ship)>toF) return false;
    if(SHIP_SELECTED.size>0&&!SHIP_SELECTED.has(r.ship)) return false;
    if(regF&&divRegion(r.div)!==regF) return false;
    if(divF&&r.div!==divF) return false;
    if(poF&&r.po.toLowerCase().indexOf(poF)<0) return false;
    if(dayF){ var di=HIST_DATA.findIndex(function(d){return d.date===dayF;}); if(di<0||!r.days[di]) return false; }
    return true;
  });
  PG=0;
  document.getElementById('clbl').textContent=FILTERED.length+' POs';
  renderTable();
}

function shipClass(ship){
  if(!ship) return '';
  var iso=toISO(ship);
  var today=todayISO();
  if(iso<today) return 'ship-past';
  if(iso===today) return 'ship-today';
  return 'ship-future';
}

function statusBadge(status, dQ, daysOverdue, noCar){
  if(status==='crit'){
    var d=daysOverdue?'<span style="font-size:9px;margin-left:4px;background:#c00;color:#fff;padding:0 5px;border-radius:3px">+'+daysOverdue+' día'+(daysOverdue>1?'s':'')+'</span>':'';
    return '<span class="delta crit">🚨 Crítico</span>'+d;
  }
  if(status==='done') return '<span class="delta done">📦 Entregado</span>';
  if(status==='gone') return '<span class="delta gone">❌ Eliminado</span>';
  if(status==='new')  return '<span class="delta new">🆕 Nuevo</span>'+(noCar?'<span style="font-size:9px;margin-left:4px;background:#f0c040;color:#7a5500;padding:0 5px;border-radius:3px;font-weight:700">🚚 Sin carrier</span>':'');
  if(status==='changed'){
    if(dQ>0) return '<span class="delta add">✅ +'+dQ+' ADD</span>';
    if(dQ<0) return '<span class="delta cancel">❌ '+dQ+' CANCEL</span>';
  }
  var nc=noCar?'<span style="font-size:9px;margin-left:4px;background:#f0c040;color:#7a5500;padding:0 5px;border-radius:3px;font-weight:700">🚚 Sin carrier</span>':'';
  return '<span class="delta zero">✅</span>'+nc;
}

function renderTable(){
  var body=document.getElementById('tbody');
  var cols=4+HIST_DATA.length+2;
  if(!FILTERED.length){body.innerHTML='<tr><td colspan="'+cols+'" class="erow">No hay registros.</td></tr>';renderPg(0,0,0);return;}
  var total=FILTERED.length;
  var maxPg=Math.ceil(total/PG_SIZE)-1;
  if(PG<0)PG=0;if(PG>maxPg)PG=maxPg;
  var start=PG*PG_SIZE,end=Math.min(start+PG_SIZE,total);
  var page=FILTERED.slice(start,end);
  var html='';
  var rowClsMap={crit:'row-crit',changed:'row-warn',new:'row-new',same:'row-ok',done:'row-done',gone:'row-gone'};

  for(var i=0;i<page.length;i++){
    var r=page[i];
    var id='r'+(start+i);
    var exp=!!EXPANDED[id];
    var div=r.div?'<span class="dtag">'+r.div+'</span>':'—';
    var sc=shipClass(r.ship);
    var shipCell=r.ship?'<span class="ship-date '+sc+'">'+r.ship+'</span>':'<span class="qty-empty">—</span>';
    var carrierCell=r.carrier?'<span style="font-size:10px;color:var(--muted)">'+r.carrier+'</span>':'<span class="pend">Pendiente</span>';

    var chkd=!!SELECTED[r.po];
    var shipBadge=r.shipChanged?'<span style="font-size:9px;background:#fff0cc;border:1px solid #f0c040;border-radius:3px;padding:0 5px;color:#7a5500;font-weight:700;margin-left:4px">📅 Cambió</span>':'';
    if(r.shipDelay>0) shipBadge+='<span style="font-size:9px;background:#faeeda;border:1px solid #f0c040;border-radius:3px;padding:0 5px;color:#854F0B;font-weight:700;margin-left:4px">📅 +'+r.shipDelay+'d</span>';
    if(r.shipAdvance>0) shipBadge+='<span style="font-size:9px;background:#e2f5eb;border:1px solid #9fd4b0;border-radius:3px;padding:0 5px;color:#1a6b3a;font-weight:700;margin-left:4px">📅 -'+r.shipAdvance+'d</span>';
    var woBadge=r.noWO?'<span style="font-size:9px;background:#fcebeb;border:1px solid #f09595;border-radius:3px;padding:0 5px;color:#991f1f;font-weight:700;margin-left:4px">❌ Sin WO</span>'
              :(r.hasWO?'<span style="font-size:9px;background:#e2f5eb;border:1px solid #9fd4b0;border-radius:3px;padding:0 5px;color:#1a6b3a;font-weight:700;margin-left:4px">✅ WO</span>':'');
    html+='<tr class="'+(rowClsMap[r.status]||'row-ok')+(exp?' exp-main':'')+'">';
    html+='<td class="tc" onclick="event.stopPropagation()"><input type="checkbox" '+(chkd?'checked':'')+' onchange="toggleSel(\''+r.po+'\',this.checked)"></td>';
    html+='<td class="tl"><span class="po-cell">'+r.po+'</span>'+woBadge+'</td>';
    html+='<td class="tl">'+div+'</td>';
    html+='<td class="tl">'+shipCell+shipBadge+'</td>';
    html+='<td class="tl" style="font-size:11px">'+carrierCell+'</td>';
    // Find last day index with data and previous
    var lastDayIdx=-1, prevDayIdx=-1;
    for(var di=HIST_DATA.length-1;di>=0;di--){ if(r.days[di]){lastDayIdx=di;break;} }
    for(var di=lastDayIdx-1;di>=0;di--){ if(r.days[di]){prevDayIdx=di;break;} }
    var mainQdiff=lastDayIdx>=0&&prevDayIdx>=0?Math.round(r.days[lastDayIdx].qty-r.days[prevDayIdx].qty):null;
    for(var d=0;d<HIST_DATA.length;d++){
      var dd=r.days[d];
      if(!dd){ html+='<td class="qty-empty">—</td>'; continue; }
      var truckIcon=d===r.carrierDayIdx?'<span title="'+r.carrier+'" style="cursor:default"> 🚚</span>':'';
      var isChangedDay=d===lastDayIdx&&mainQdiff!==null&&mainQdiff!==0;
      var isGoneDay=d===lastDayIdx&&r.isGone;
      if(isGoneDay){
        html+='<td><span style="display:inline-block;font-family:monospace;font-weight:800;background:#E24B4A;border-radius:5px;padding:2px 8px;color:#fff;min-width:24px;text-align:center">—</span>'+truckIcon+'</td>';
      } else if(isChangedDay&&mainQdiff<0){
        html+='<td><span style="display:inline-block;font-family:monospace;font-weight:800;background:#E24B4A;border-radius:5px;padding:2px 8px;color:#fff;min-width:24px;text-align:center">'+fN(dd.qty)+'</span>'+truckIcon+'</td>';
      } else if(isChangedDay&&mainQdiff>0){
        html+='<td><span style="display:inline-block;font-family:monospace;font-weight:800;background:#3B8F1A;border-radius:5px;padding:2px 8px;color:#fff;min-width:24px;text-align:center">'+fN(dd.qty)+'</span>'+truckIcon+'</td>';
      } else {
        html+='<td><span style="font-family:monospace;font-weight:700;color:var(--navy)">'+fN(dd.qty)+'</span>'+truckIcon+'</td>';
      }
    }
    html+='<td class="tc">'+statusBadge(r.status,r.dQ,r.daysOverdue,r.noCar)+'</td>';
    html+='<td><button class="xbtn" onclick="tog(\''+id+'\')">'+( exp?'▲':'▼')+'</button></td>';
    html+='</tr>';
    if(exp) html+=buildDetail(r,cols,id);
  }
  body.innerHTML=html;
  // Footer totals
  var visRows=FILTERED;
  var totalPOs=visRows.length;
  var totalCajas=visRows.reduce(function(s,r){ var d=r.days[HIST_DATA.length-1]; return s+(d?Math.round(d.qty):0); },0);
  var selPOs=Object.keys(SELECTED).filter(function(po){return FILTERED.some(function(r){return r.po===po;});}).length;
  var tfoot=document.getElementById('tfoot-row');
  if(tfoot){
    tfoot.innerHTML='<td></td><td class="tl" style="font-weight:700;color:var(--navy);font-size:11px">'+totalPOs+' POs'+( selPOs?' · '+selPOs+' selec.':'')+'</td>'
      +'<td></td><td></td><td></td>'
      +HIST_DATA.map(function(d,i){
        var s=visRows.reduce(function(acc,r){return acc+(r.days[i]?Math.round(r.days[i].qty):0);},0);
        return '<td style="font-family:monospace;font-weight:700;color:var(--navy);border-top:1.5px solid var(--border)">'+s.toLocaleString()+'</td>';
      }).join('')
      +'<td style="font-size:10px;color:var(--muted);border-top:1.5px solid var(--border)">'+totalCajas.toLocaleString()+' cajas</td><td></td>';
  }
  renderPg(start,end,total);
}

function buildDetail(r,cols){
  var keys=Object.keys(r.prods).sort();
  if(!keys.length) return '<tr class="drow"><td colspan="'+cols+'"><div class="dinner" style="color:var(--muted);font-size:11px;font-style:italic">Sin detalle de productos.</div></td></tr>';

  var lastISO=HIST_DATA.length?HIST_DATA[HIST_DATA.length-1].date:'';
  var prevISO='';
  for(var i=HIST_DATA.length-2;i>=0;i--){ if(HIST_DATA[i]){ prevISO=HIST_DATA[i].date; break; } }

  var tbl='<table class="det-tbl"><thead><tr><th class="tl">SKU</th><th class="tl">Descripción</th>';
  HIST_DATA.forEach(function(d){ tbl+='<th>'+d.label+'</th>'; });
  tbl+='<th>Δ</th></tr></thead><tbody>';

  keys.forEach(function(k){
    var p=r.prods[k];
    var dayQtys=HIST_DATA.map(function(d){ var dp=d.pos[r.po]; return (dp&&dp.prods&&dp.prods.hasOwnProperty(k))?Math.round(dp.prods[k].qty):null; });
    var lastQ=dayQtys.length?dayQtys[dayQtys.length-1]:null;
    var prevQ=null;
    for(var i=dayQtys.length-2;i>=0;i--){ if(dayQtys[i]!==null){prevQ=dayQtys[i];break;} }
    var diff=(lastQ!==null&&prevQ!==null)?lastQ-prevQ:null;
    var isSkuNew=lastQ!==null&&prevQ===null;
    var isSkuGone=lastQ===null&&prevQ!==null;
    var isSkuZero=lastQ===0&&prevQ!==null&&prevQ>0;
    var rowCls=isSkuZero?'sku-zero':(isSkuNew?'sku-new':(isSkuGone?'sku-gone':(diff&&diff<0?'sku-warn':(diff&&diff>0?'sku-add':''))));
    var changeDayIdx=-1;
    if(isSkuGone){ changeDayIdx=dayQtys.length-1; }
    else if(isSkuNew){ for(var i=0;i<dayQtys.length;i++){ if(dayQtys[i]!==null){changeDayIdx=i;break;} } }
    else if(diff&&Math.abs(diff)>0){ changeDayIdx=dayQtys.length-1; }
    var dBadge=isSkuZero?'<span style="font-size:9px;background:#F7C1C1;color:#791F1F;padding:2px 7px;border-radius:3px;font-weight:700;border:1px solid #F09595">CANCEL</span>'
              :isSkuNew?'<span style="font-size:9px;background:#C0DD97;color:#27500A;padding:2px 7px;border-radius:3px;font-weight:700;border:1px solid #97C459">ADD</span>'
              :isSkuGone?'<span style="font-size:9px;background:#F7C1C1;color:#791F1F;padding:2px 7px;border-radius:3px;font-weight:700;border:1px solid #F09595">CANCEL</span>'
              :diff?'<span style="font-size:9px;background:'+(diff<0?'#FAEEDA':'#EAF3DE')+';color:'+(diff<0?'#633806':'#27500A')+';padding:0 6px;border-radius:3px;font-weight:700;border:1px solid '+(diff<0?'#EF9F27':'#97C459')+'">'+(diff>0?'+':'')+diff+'</span>'
              :'<span style="color:var(--muted)">—</span>';
    tbl+='<tr class="'+rowCls+'"><td class="tl" style="font-family:monospace;font-size:10px">'+k+'</td><td class="tl">'+p.desc+'</td>';
    dayQtys.forEach(function(q,qi){
      var isChange=qi===changeDayIdx;
      if(q===null){
        if(isChange&&isSkuGone) tbl+='<td><span style="display:inline-block;font-family:monospace;font-weight:800;background:#E24B4A;border-radius:5px;padding:2px 8px;color:#fff;min-width:20px;text-align:center">—</span></td>';
        else tbl+='<td style="color:#c5d5e5">—</td>';
      } else if(isChange&&isSkuNew){
        tbl+='<td><span style="display:inline-block;font-family:monospace;font-weight:800;background:#3B8F1A;border-radius:5px;padding:2px 8px;color:#fff;min-width:20px;text-align:center">'+q+'</span></td>';
      } else if(isChange&&diff&&diff!==0){
        var bg=diff<0?'#E24B4A':'#3B8F1A';
        tbl+='<td><span style="display:inline-block;font-family:monospace;font-weight:800;background:'+bg+';border-radius:5px;padding:2px 8px;color:#fff;min-width:20px;text-align:center">'+q+'</span></td>';
      } else {
        tbl+='<td style="font-family:monospace;font-weight:600">'+q+'</td>';
      }
    });
    tbl+='<td>'+dBadge+'</td></tr>';
  });
  tbl+='</tbody></table>';
  var noteKey='note_'+r.po;
  var noteVal='';
  try{ noteVal=localStorage.getItem(noteKey)||''; }catch(e){}
  var noteSec='<div style="margin-top:.75rem;padding-top:.75rem;border-top:1px dashed var(--border)">'
    +'<label style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">📝 Nota</label>'
    +'<textarea id="note-'+r.po+'" style="width:100%;margin-top:4px;padding:6px 8px;border:0.5px solid var(--border);border-radius:6px;font-size:11px;font-family:inherit;resize:vertical;min-height:48px;background:var(--white)" placeholder="Ej: coordinado con proveedor, en tránsito...">'+noteVal+'</textarea>'
    +'<button onclick="saveNote(\''+r.po+'\')" style="margin-top:4px;font-size:11px;padding:3px 10px;border:0.5px solid var(--border);border-radius:6px;background:var(--navy);color:#fff;cursor:pointer;font-family:inherit">Guardar nota</button>'
    +'</div>';

  return '<tr class="drow"><td colspan="'+cols+'"><div class="dinner">'+tbl+noteSec+'</div></td></tr>';
}

// ── SHIP DATE MULTI-SELECT ──
var SHIP_DD_OPEN = false;

function toggleShipDD(){
  SHIP_DD_OPEN = !SHIP_DD_OPEN;
  var menu = document.getElementById('ship-dd-menu');
  var arrow = document.getElementById('ship-dd-arrow');
  if(menu) menu.style.display = SHIP_DD_OPEN ? 'block' : 'none';
  if(arrow) arrow.textContent = SHIP_DD_OPEN ? '▲' : '▼';
}

function buildShipDD(dates){
  var items = document.getElementById('ship-dd-items');
  if(!items) return;
  var today = todayISO();
  var tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate()+1);
  var tomorrowISO = tomorrow.getFullYear()+'-'+String(tomorrow.getMonth()+1).padStart(2,'0')+'-'+String(tomorrow.getDate()).padStart(2,'0');
  var html = '';
  dates.forEach(function(d){
    var iso = toISO(d);
    var tag = '';
    if(iso === today) tag = '<span style="font-size:9px;background:#e2f5eb;color:#1a6b3a;padding:1px 6px;border-radius:10px;margin-left:auto;font-weight:500">Hoy</span>';
    else if(iso === tomorrowISO) tag = '<span style="font-size:9px;background:#fff8e1;color:#7a5500;padding:1px 6px;border-radius:10px;margin-left:auto;font-weight:500">Mañana</span>';
    var chk = SHIP_SELECTED.has(d) ? 'checked' : '';
    html += '<div style="display:flex;align-items:center;gap:8px;padding:5px 10px;cursor:pointer;font-size:11px;color:var(--text)" onclick="toggleShipDate(&quot;'+d+'&quot;)">'
      + '<input type="checkbox" '+chk+' style="accent-color:#1a5fa8;width:13px;height:13px;pointer-events:none">'
      + '<span>'+d+'</span>'+tag+'</div>';
  });
  items.innerHTML = html;
  updateShipLabel();
}

function toggleShipDate(d){
  if(SHIP_SELECTED.has(d)) SHIP_SELECTED.delete(d);
  else SHIP_SELECTED.add(d);
  // Rebuild items
  var allDates = [];
  document.querySelectorAll('#ship-dd-items div').forEach(function(el){
    var span = el.querySelectorAll('span')[0];
    if(span) allDates.push(span.textContent.trim());
  });
  buildShipDD(allDates);
  applyF();
}

function clearShipDates(){
  SHIP_SELECTED.clear();
  var allDates = [];
  document.querySelectorAll('#ship-dd-items div').forEach(function(el){
    var span = el.querySelectorAll('span')[0];
    if(span) allDates.push(span.textContent.trim());
  });
  buildShipDD(allDates);
  applyF();
}

function updateShipLabel(){
  var btn = document.getElementById('ship-dd-btn');
  var lbl = document.getElementById('ship-dd-label');
  var cnt = document.getElementById('ship-dd-count');
  var n = SHIP_SELECTED.size;
  if(cnt) cnt.textContent = n + ' fecha'+(n!==1?'s':'');
  if(!lbl) return;
  if(n===0){ lbl.textContent='Todas las fechas'; if(btn) btn.style.background=''; if(btn) btn.style.color=''; if(btn) btn.style.borderColor=''; }
  else if(n<=2){ lbl.textContent=Array.from(SHIP_SELECTED).sort().join(' · ').replace(/\/\d{4}/g,''); if(btn){btn.style.background='#deeaf7';btn.style.color='#1a5fa8';btn.style.borderColor='#1a5fa8';} }
  else { lbl.textContent=n+' fechas selec.'; if(btn){btn.style.background='#deeaf7';btn.style.color='#1a5fa8';btn.style.borderColor='#1a5fa8';} }
}

// Close dropdown when clicking outside
document.addEventListener('click', function(e){
  var wrap = document.getElementById('ship-dd-wrap');
  if(SHIP_DD_OPEN && wrap && !wrap.contains(e.target)){
    SHIP_DD_OPEN = false;
    var menu = document.getElementById('ship-dd-menu');
    var arrow = document.getElementById('ship-dd-arrow');
    if(menu) menu.style.display = 'none';
    if(arrow) arrow.textContent = '▼';
  }
});

var HOY_ACTIVE=false;
function toggleToday(){
  HOY_ACTIVE=!HOY_ACTIVE;
  var btn=document.getElementById('btn-hoy');
  if(btn){
    btn.style.background=HOY_ACTIVE?'var(--blue)':'var(--light)';
    btn.style.color=HOY_ACTIVE?'#fff':'var(--blue)';
  }
  if(HOY_ACTIVE){
    var today=todayISO();
    var allDates=[];
    document.querySelectorAll('#ship-dd-items div').forEach(function(el){
      var span=el.querySelectorAll('span')[0];
      if(span) allDates.push(span.textContent.trim());
    });
    SHIP_SELECTED.clear();
    var best=allDates.filter(function(d){return toISO(d)>=today;}).sort(function(a,b){return toISO(a)<toISO(b)?-1:1;})[0];
    if(best) SHIP_SELECTED.add(best);
    buildShipDD(allDates);
  } else {
    var allDates=[];
    document.querySelectorAll('#ship-dd-items div').forEach(function(el){
      var span=el.querySelectorAll('span')[0];
      if(span) allDates.push(span.textContent.trim());
    });
    SHIP_SELECTED.clear();
    buildShipDD(allDates);
  }
  applyF();
}
function setToday(){ if(!HOY_ACTIVE){ toggleToday(); } }

function saveNote(po){
  var el=document.getElementById('note-'+po);
  if(!el) return;
  try{ localStorage.setItem('note_'+po, el.value); }catch(e){}
  el.style.borderColor='var(--ok)';
  setTimeout(function(){ el.style.borderColor=''; },1500);
}

function tog(id){ EXPANDED[id]=!EXPANDED[id]; renderTable(); }

function toggleAll(checked){
  FILTERED.forEach(function(r){ if(checked) SELECTED[r.po]=true; else delete SELECTED[r.po]; });
  renderTable();
}
function toggleSel(po, checked){
  if(checked) SELECTED[po]=true; else delete SELECTED[po];
  var allChk=document.getElementById('chk-all');
  if(allChk) allChk.checked=FILTERED.length>0&&FILTERED.every(function(r){return !!SELECTED[r.po];});
  // Update footer count without full re-render
  var selPOs=Object.keys(SELECTED).filter(function(p){return FILTERED.some(function(r){return r.po===p;});}).length;
  var tfoot=document.getElementById('tfoot-row');
  if(tfoot){
    var firstTd=tfoot.querySelector('td.tl');
    if(firstTd&&selPOs>0) firstTd.textContent=FILTERED.length+' POs · '+selPOs+' selec.';
    else if(firstTd) firstTd.textContent=FILTERED.length+' POs';
  }
}

function sortBy(col){
  if(SORT_COL===col) SORT_DIR*=-1; else{SORT_COL=col;SORT_DIR=1;}
  FILTERED.sort(function(a,b){
    var av,bv;
    if(col==='po'){ av=a.po;bv=b.po; return av.localeCompare(bv)*SORT_DIR; }
    if(col==='div'){ av=a.div||'';bv=b.div||''; return av.localeCompare(bv)*SORT_DIR; }
    if(col==='ship'){ av=toISO(a.ship)||'';bv=toISO(b.ship)||''; return av.localeCompare(bv)*SORT_DIR; }
    if(col==='status'){ var so={crit:0,changed:1,new:2,same:3,done:4,gone:5}; av=so[a.status]||9;bv=so[b.status]||9; return (av-bv)*SORT_DIR; }
    if(col.indexOf('qty')===0){
      var di=parseInt(col.replace('qty',''));
      av=a.days[di]?a.days[di].qty:0; bv=b.days[di]?b.days[di].qty:0;
      return (av-bv)*SORT_DIR;
    }
    return 0;
  });
  PG=0; renderTable();
}
function pgGo(d){PG+=d;renderTable();}
function renderPg(s,e,t){
  var mx=Math.ceil((t||1)/PG_SIZE)-1;
  document.getElementById('pgPrev').disabled=PG<=0;
  document.getElementById('pgNext').disabled=PG>=mx;
  document.getElementById('pgInfo').textContent=t?'Página '+(PG+1)+' de '+(mx+1):'';
  document.getElementById('pgTotal').textContent=t?'Mostrando '+(s+1)+'–'+e+' de '+t+' POs':'';
}

function exportCSV(selOnly){
  var rows=selOnly?FILTERED.filter(function(r){return SELECTED[r.po];}):FILTERED;
  if(!rows.length){alert(selOnly?'No hay filas seleccionadas.':'No hay datos.');return;}
  
  var statuses=[
    {key:'crit',label:'CRITICOS'},
    {key:'changed',label:'CAMBIOS'},
    {key:'new',label:'NUEVOS'},
    {key:'same',label:'SIN CAMBIO'},
    {key:'done',label:'ENTREGADOS'},
    {key:'gone',label:'ELIMINADOS'}
  ];
  
  var cols=['PO','División','Región','Ship Date','Carrier','WO','Ship Delay','Ship Advance'];
  HIST_DATA.forEach(function(d){cols.push(d.label+' Qty');});
  cols.push('Estado');
  
  var lines=['=== REPORTE ITN SEGUIMIENTO ===','Exportado: '+new Date().toLocaleString(),''];
  
  statuses.forEach(function(st){
    var stRows=rows.filter(function(r){return r.status===st.key;});
    if(!stRows.length) return;
    lines.push('--- '+st.label+' ('+stRows.length+' POs) ---');
    lines.push(cols.join(','));
    stRows.forEach(function(r){
      var row=[r.po,r.div||'',divRegion(r.div),r.ship||'',r.carrier||'',
               r.hasWO?'SI':(r.noWO?'NO':''),
               r.shipDelay?'+'+r.shipDelay+'d':'',
               r.shipAdvance?'-'+r.shipAdvance+'d':''];
      r.days.forEach(function(d){row.push(d?Math.round(d.qty):'');});
      row.push(st.label);
      lines.push(row.join(','));
    });
    lines.push('');
  });
  
  var csv=lines.join('\r\n');
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download='ITN_Seguimiento_'+(selOnly?'seleccion_':'')+todayISO()+'.csv';
  a.style.display='none';document.body.appendChild(a);a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},1000);
  return;
}
